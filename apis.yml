aid: national-energy-system-operator
name: National Energy System Operator
description: >-
  The National Energy System Operator (NESO) is the independent operator responsible for planning and operating Great
  Britain's electricity and gas networks. NESO publishes operational, market, and forecasting datasets through its Data
  Portal, which exposes a CKAN v3 API for programmatic access to energy system data including wind forecasts, demand
  predictions, balancing services, and transmission constraints.
